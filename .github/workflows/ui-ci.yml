name: UI CI

on:
  push:
    branches: [main]
    paths: ['ui/**']
  pull_request:
    branches: [main]
    paths: ['ui/**']

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - run: npm run build
