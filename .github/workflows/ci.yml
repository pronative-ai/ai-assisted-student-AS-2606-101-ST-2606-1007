name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore src/OpenCode.sln

      - run: dotnet build src/OpenCode.sln --no-restore --configuration Release

      - run: dotnet test src/OpenCode.sln --no-build --configuration Release
